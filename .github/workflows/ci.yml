name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # tsc-only, no DB needed.
      - name: typecheck
        run: pnpm typecheck

      # Static-analysis guards — also DB-free.
      - name: check-tenant-scope (STRICT=1)
        env:
          STRICT: "1"
        run: pnpm -C apps/lms-web check-tenant-scope

      - name: check-cli-rls-scope
        run: pnpm -C apps/lms-web check-cli-rls-scope

      # vitest is intentionally OMITTED. Several vitest specs (tenant-copy,
      # cross-schema, per-tenant-provision, per-tenant-rls) seed rows into
      # public.lms_* tables, which are NOT created by any tracked migration —
      # they were Flask's SQLAlchemy-managed tables and came into the dev DB
      # via `db.create_all()` at first Flask startup. With Flask retired
      # (Phase 5), there's no longer a path to reproduce that schema in a
      # fresh CI Postgres. Adding vitest back to CI requires either:
      #   1. Committing a `pg_dump --schema-only` fixture of the public.lms_*
      #      tables and applying it here before vitest, or
      #   2. Migrating the LMS table DDL into Drizzle (declare in
      #      lms-schema.ts as authoritative + generate migrations).
      # Both are tracked in project_open_followups.md as separate work.
