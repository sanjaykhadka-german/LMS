name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Postgres service: matches local dev (root/root, lms_dev) so the same
    # DATABASE_URL works without conditional logic. The Docker entrypoint
    # creates `root` as a superuser, which mirrors the dev box and lets
    # bare-db test fixtures bypass RLS for setup. The non-superuser RLS
    # regression test (per-tenant-rls.test.ts) connects via tracey_test_rls
    # instead, which is created later in the workflow.
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: root
          POSTGRES_DB: lms_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://root:root@localhost:5432/lms_dev

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Drizzle-tracked migrations bring the schema up to 0004_brown_wasp.
      # Anything in packages/db/migrations/manual/ is operator-driven on
      # prod; CI applies the subset the test suite depends on below.
      - name: Apply Drizzle migrations
        run: pnpm --filter @tracey/db run migrate

      # Manual migrations the tests depend on. Order matters:
      #   - 0006 creates app.tenant_migrations (per-tenant ledger)
      #   - 0004 enables RLS, with the per-tenant-rls test in mind.
      # Other manual files (0004_ai_studio_sessions, 0005_backfill_14d_trial,
      # 0007_cancel_at_period_end) are either superseded by Drizzle or are
      # data fixes not needed for tests.
      - name: Apply tenant_migrations ledger
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f packages/db/migrations/manual/0006_tenant_migrations_ledger.sql

      - name: Apply RLS migration
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f packages/db/migrations/manual/0004_enable_rls.sql

      - name: Set up test RLS role
        run: pnpm -C apps/lms-web run setup:test-rls-role

      - name: typecheck
        run: pnpm typecheck

      - name: check-tenant-scope (STRICT=1)
        env:
          STRICT: "1"
        run: pnpm -C apps/lms-web check-tenant-scope

      - name: check-cli-rls-scope
        run: pnpm -C apps/lms-web check-cli-rls-scope

      # vitest with RLS_TEST_DATABASE_URL set, so the per-tenant-rls
      # regression runs under the non-superuser role and would fail loudly
      # if any of dataCopySql / verify / tenant-provision lose their
      # set_config('app.tenant_id') call again. Without this env var, the
      # test self-skips and CI provides no coverage of the RLS pathway.
      - name: vitest (incl. per-tenant-rls regression)
        env:
          RLS_TEST_DATABASE_URL: postgresql://tracey_test_rls:tracey_test_rls@localhost:5432/lms_dev
        run: pnpm --filter lms-web run test
