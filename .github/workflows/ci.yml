name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Postgres service: matches local dev (root/root, lms_dev) so the same
    # DATABASE_URL works without conditional logic. The Docker entrypoint
    # creates `root` as a superuser, which mirrors the dev box and lets
    # bare-db test fixtures bypass RLS for setup. The non-superuser RLS
    # regression test (per-tenant-rls.test.ts) connects via tracey_test_rls
    # instead, which is created later in the workflow.
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: root
          POSTGRES_DB: lms_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://root:root@localhost:5432/lms_dev

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Drizzle-tracked migrations bring the `app` and `drizzle` schemas up
      # to whatever's on origin. Public/LMS tables are NOT created by these.
      - name: Apply Drizzle migrations
        run: pnpm --filter @tracey/db run migrate

      # Bootstrap the public.lms_* tables from the committed fixture.
      # Source of truth: a `pg_dump --schema-only --schema=public` of the
      # canonical local lms_dev. Updated by re-running pg_dump whenever
      # the LMS table shape changes (Flask retired in Phase 5; no
      # Drizzle-managed migrations exist for these tables).
      - name: Apply LMS schema fixture
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f packages/db/fixtures/lms-public-schema.sql

      # Manual migrations the test suite depends on:
      #   0004_ai_studio_sessions creates app.ai_studio_sessions —
      #     deliberately NOT in the Drizzle migration (0004_brown_wasp
      #     stripped its CREATE statements per the snapshot-gotcha
      #     comment in that file), so a manual apply is required.
      #   0006 creates app.tenant_migrations (per-tenant ledger).
      #   0004_enable_rls enables RLS on public.lms_* + app.ai_studio_sessions.
      - name: Apply ai_studio_sessions table
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f packages/db/migrations/manual/0004_ai_studio_sessions.sql

      - name: Apply tenant_migrations ledger
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f packages/db/migrations/manual/0006_tenant_migrations_ledger.sql

      - name: Apply RLS migration
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f packages/db/migrations/manual/0004_enable_rls.sql

      # 0009 enables RLS on app.notifications. Must come AFTER 0005 created
      # the table (which Drizzle migrate did) and AFTER the test RLS role
      # is irrelevant to apply (the role is created next; RLS targets
      # FORCE-mode so all roles are subject regardless).
      - name: Apply notifications RLS
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f packages/db/migrations/manual/0009_enable_rls_notifications.sql

      - name: Set up test RLS role
        run: pnpm -C apps/lms-web run setup:test-rls-role

      - name: typecheck
        run: pnpm typecheck

      - name: check-tenant-scope (STRICT=1)
        env:
          STRICT: "1"
        run: pnpm -C apps/lms-web check-tenant-scope

      - name: check-cli-rls-scope
        run: pnpm -C apps/lms-web check-cli-rls-scope

      # vitest with RLS_TEST_DATABASE_URL set, so the per-tenant-rls
      # regression runs under the non-superuser role and would fail loudly
      # if any of dataCopySql / verifyTenantCopy / tenant-provision lose
      # their set_config('app.tenant_id') call again.
      - name: vitest (incl. per-tenant-rls regression)
        env:
          RLS_TEST_DATABASE_URL: postgresql://tracey_test_rls:tracey_test_rls@localhost:5432/lms_dev
        run: pnpm --filter lms-web run test
