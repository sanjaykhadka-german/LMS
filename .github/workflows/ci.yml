name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Postgres service: matches local dev (root/root, lms_dev) so the same
    # DATABASE_URL works without conditional logic. The Docker entrypoint
    # creates `root` as a superuser, which mirrors the dev box and lets
    # bare-db test fixtures bypass RLS for setup. The non-superuser RLS
    # regression test (per-tenant-rls.test.ts) connects via tracey_test_rls
    # instead, which is created later in the workflow.
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: root
          POSTGRES_DB: lms_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://root:root@localhost:5432/lms_dev

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Consolidated DB setup. Each substep is wrapped in ::group:: so the
      # GH Actions UI still shows collapsible sections per phase, but only
      # one outer step is paid for in action overhead (~5-10s per step).
      #
      # Order matters:
      #   1. Drizzle-tracked migrations build `app` + `drizzle` schemas
      #      (does NOT touch public.lms_* — those tables are owned by the
      #      committed pg_dump fixture, see Phase 5 retirement).
      #   2. LMS schema fixture seeds public.lms_*.
      #   3. Manual migration 0004_ai_studio_sessions creates app.ai_studio_sessions
      #      (intentionally stripped from Drizzle's 0004_brown_wasp per the
      #      snapshot-gotcha comment in that file).
      #   4. 0006 creates app.tenant_migrations ledger.
      #   5. 0004_enable_rls enables RLS on public.lms_* + ai_studio_sessions.
      #   6. 0009 enables RLS on app.notifications (table created by Drizzle 0005).
      #   7. Test RLS role for the per-tenant-rls regression.
      - name: DB setup (migrations + RLS + test role)
        run: |
          set -euo pipefail
          echo '::group::Drizzle migrations (app + drizzle schemas)'
          pnpm --filter @tracey/db run migrate
          echo '::endgroup::'
          echo '::group::Apply LMS schema fixture (public.lms_*)'
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f packages/db/fixtures/lms-public-schema.sql
          echo '::endgroup::'
          echo '::group::Apply manual migration: ai_studio_sessions'
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f packages/db/migrations/manual/0004_ai_studio_sessions.sql
          echo '::endgroup::'
          echo '::group::Apply manual migration: tenant_migrations ledger'
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f packages/db/migrations/manual/0006_tenant_migrations_ledger.sql
          echo '::endgroup::'
          echo '::group::Apply manual migration: RLS on public.lms_* + ai_studio_sessions'
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f packages/db/migrations/manual/0004_enable_rls.sql
          echo '::endgroup::'
          echo '::group::Apply manual migration: RLS on app.notifications'
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f packages/db/migrations/manual/0009_enable_rls_notifications.sql
          echo '::endgroup::'
          echo '::group::Set up test RLS role'
          pnpm -C apps/lms-web run setup:test-rls-role
          echo '::endgroup::'

      - name: typecheck
        run: pnpm typecheck

      - name: lint
        run: pnpm -C apps/lms-web run lint

      - name: check-tenant-scope (STRICT=1)
        env:
          STRICT: "1"
        run: pnpm -C apps/lms-web check-tenant-scope

      - name: check-cli-rls-scope
        run: pnpm -C apps/lms-web check-cli-rls-scope

      # vitest with RLS_TEST_DATABASE_URL set, so the per-tenant-rls
      # regression runs under the non-superuser role and would fail loudly
      # if any of dataCopySql / verifyTenantCopy / tenant-provision lose
      # their set_config('app.tenant_id') call again.
      - name: vitest (incl. per-tenant-rls regression)
        env:
          RLS_TEST_DATABASE_URL: postgresql://tracey_test_rls:tracey_test_rls@localhost:5432/lms_dev
        run: pnpm --filter lms-web run test
