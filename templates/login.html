{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4">
      <h3 class="mb-4">Sign in</h3>
      <form method="post">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" required class="form-control" autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group">
            <input type="password" name="password" id="password" required class="form-control">
            <button type="button" class="btn btn-outline-secondary" id="toggle-pw"
                    aria-label="Show password" tabindex="-1">Show</button>
          </div>
        </div>
        <button class="btn btn-primary w-100">Sign in</button>
      </form>
    </div>
  </div>
</div>
<script>
  (function () {
    var btn = document.getElementById('toggle-pw');
    var pw = document.getElementById('password');
    if (!btn || !pw) return;
    btn.addEventListener('click', function () {
      var showing = pw.type === 'text';
      pw.type = showing ? 'password' : 'text';
      btn.textContent = showing ? 'Show' : 'Hide';
      btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
    });
  })();
</script>
{% endblock %}
