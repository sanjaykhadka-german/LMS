{% extends "base.html" %}
{% block title %}Change password{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="gb-pageheader">
      <span class="gb-eyebrow">Account</span>
      <h1>Change password</h1>
      <p class="lede">Pick something at least 8 characters, and memorable.</p>
    </div>
    <div class="card p-4">
      <form method="post">
        <div class="mb-3">
          <label class="form-label">Current password</label>
          <div class="input-group">
            <input type="password" name="old" required class="form-control js-pw">
            <button type="button" class="btn btn-outline-secondary js-pw-toggle" tabindex="-1">Show</button>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">New password</label>
          <div class="input-group">
            <input type="password" name="new" required minlength="8" class="form-control js-pw">
            <button type="button" class="btn btn-outline-secondary js-pw-toggle" tabindex="-1">Show</button>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Confirm new password</label>
          <div class="input-group">
            <input type="password" name="confirm" required minlength="8" class="form-control js-pw">
            <button type="button" class="btn btn-outline-secondary js-pw-toggle" tabindex="-1">Show</button>
          </div>
        </div>
        <button class="btn btn-primary w-100 gb-arrow">Update password</button>
      </form>
      <script>
        document.querySelectorAll('.js-pw-toggle').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var input = btn.parentElement.querySelector('.js-pw');
            if (!input) return;
            var showing = input.type === 'text';
            input.type = showing ? 'password' : 'text';
            btn.textContent = showing ? 'Show' : 'Hide';
          });
        });
      </script>
    </div>
  </div>
</div>
{% endblock %}
