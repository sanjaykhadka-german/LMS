services:
  - type: web
    name: lms
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 180 --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: lms-db
          property: connectionString
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        value: training@germanbutchery.com.au
      - key: MAIL_FROM_NAME
        value: German Butchery Training
      - key: APP_BASE_URL
        sync: false
      - key: ADMIN_EMAIL
        value: sanjay.khadka@germanbutchery.com.au
      - key: PASS_THRESHOLD
        value: "80"
      - key: GEMINI_API_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      # ─── Phase 2 SSO bridge ───
      # LMS_SSO_SECRET is generated on the lms-web service (below) and must
      # be copied here manually — Render doesn't have a "syncFromService"
      # mechanism, so this is a dashboard step.
      - key: LMS_SSO_SECRET
        sync: false
      # The single Tracey tenant (workspace) UUID allowed to SSO into Flask.
      # Phase 3+ may relax this when Flask becomes multi-tenant.
      - key: LMS_ALLOWED_TENANT_ID
        sync: false

  # ─── Tracey monorepo (added Phase 1) ───
  - type: web
    name: lms-web
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @tracey/db run migrate && pnpm --filter lms-web build
    startCommand: pnpm --filter lms-web start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lms-db
          property: connectionString
      - key: NODE_VERSION
        value: "22.13.0"
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_URL
        sync: false
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        value: training@germanbutchery.com.au
      - key: MAIL_FROM_NAME
        value: German Butchery Training
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER_MONTHLY
        sync: false
      - key: STRIPE_PRICE_STARTER_ANNUAL
        sync: false
      - key: STRIPE_PRICE_PRO_MONTHLY
        sync: false
      - key: STRIPE_PRICE_PRO_ANNUAL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: FLASK_BASE_URL
        sync: false
      - key: LMS_SSO_SECRET
        generateValue: true

  - type: cron
    name: lms-stripe-reconcile
    runtime: node
    plan: free
    schedule: "0 3 * * *"
    buildCommand: corepack enable && pnpm install --frozen-lockfile
    startCommand: pnpm --filter lms-web run reconcile:stripe
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lms-db
          property: connectionString
      - key: NODE_VERSION
        value: "22.13.0"
      - key: STRIPE_SECRET_KEY
        sync: false

databases:
  - name: lms-db
    plan: free
