services:
  # ─── DORMANT (Phase 5 — Flask retired 2026-05-08) ───
  # Block kept in place so the service can be restarted from the Render
  # dashboard for emergency rollback. Source has been moved to
  # legacy-flask/ — build/start commands point there. autoDeploy is off so
  # nothing redeploys this service automatically.
  #
  # Once lms-web has been verified in prod for the soak period (see
  # legacy-flask/README.md), this whole block can be removed.
  - type: web
    name: lms
    runtime: python
    plan: free
    autoDeploy: false
    buildCommand: pip install -r legacy-flask/requirements.txt
    startCommand: cd legacy-flask && gunicorn app:app --timeout 180 --workers 2
    envVars:
      - key: TZ
        value: Australia/Sydney
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: lms-db
          property: connectionString
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        value: training@germanbutchery.com.au
      - key: MAIL_FROM_NAME
        value: German Butchery Training
      - key: APP_BASE_URL
        sync: false
      - key: ADMIN_EMAIL
        value: sanjay.khadka@germanbutchery.com.au
      - key: PASS_THRESHOLD
        value: "80"
      - key: GEMINI_API_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      # ─── Phase 2 SSO bridge ───
      # LMS_SSO_SECRET is generated on the lms-web service (below) and must
      # be copied here manually — Render doesn't have a "syncFromService"
      # mechanism, so this is a dashboard step.
      - key: LMS_SSO_SECRET
        sync: false
      # The single Tracey tenant (workspace) UUID allowed to SSO into Flask.
      # Phase 3+ may relax this when Flask becomes multi-tenant.
      - key: LMS_ALLOWED_TENANT_ID
        sync: false

  # ─── Tracey monorepo (added Phase 1) ───
  - type: web
    name: lms-web
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @tracey/db run migrate && pnpm --filter lms-web build
    startCommand: pnpm --filter lms-web start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: TZ
        value: Australia/Sydney
      - key: DATABASE_URL
        fromDatabase:
          name: lms-db
          property: connectionString
      - key: NODE_VERSION
        value: "22.13.0"
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_URL
        sync: false
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        value: training@germanbutchery.com.au
      - key: MAIL_FROM_NAME
        value: German Butchery Training
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER_MONTHLY
        sync: false
      - key: STRIPE_PRICE_STARTER_ANNUAL
        sync: false
      - key: STRIPE_PRICE_PRO_MONTHLY
        sync: false
      - key: STRIPE_PRICE_PRO_ANNUAL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: FLASK_BASE_URL
        sync: false
      - key: LMS_SSO_SECRET
        generateValue: true
      # Comma-separated emails. Members of this list see the /platform
      # super-admin surface. Keep tightly scoped to actual operators.
      - key: PLATFORM_ADMIN_EMAILS
        sync: false
      # Phase 7a — auto-provision a per-tenant schema for every new signup
      # via onboarding/actions.ts. Off would silently leave new tenants on
      # the legacy public.lms_* fallback (the DIGITECH bug, 2026-05-11).
      - key: PER_TENANT_SCHEMA_ENABLED
        value: "true"

  - type: cron
    name: lms-stripe-reconcile
    runtime: node
    plan: free
    schedule: "0 3 * * *"
    buildCommand: corepack enable && pnpm install --frozen-lockfile
    startCommand: pnpm --filter lms-web run reconcile:stripe
    envVars:
      - key: TZ
        value: Australia/Sydney
      - key: DATABASE_URL
        fromDatabase:
          name: lms-db
          property: connectionString
      - key: NODE_VERSION
        value: "22.13.0"
      - key: STRIPE_SECRET_KEY
        sync: false

  # Phase 5 — replaces Flask's lazy WHS reminder pass that used to run on
  # each admin GET. Once Flask is dormant, no admin GET fires that code, so
  # WHS expiry reminders need a real cron. Iterates every tenant.
  - type: cron
    name: lms-whs-reminders
    runtime: node
    plan: free
    schedule: "0 20 * * *"  # 20:00 UTC = 06:00 Australia/Sydney (AEST/AEDT auto-handled by TZ)
    buildCommand: corepack enable && pnpm install --frozen-lockfile
    startCommand: pnpm --filter lms-web run cron:whs-reminders
    envVars:
      - key: TZ
        value: Australia/Sydney
      - key: DATABASE_URL
        fromDatabase:
          name: lms-db
          property: connectionString
      - key: NODE_VERSION
        value: "22.13.0"
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        value: training@germanbutchery.com.au
      - key: MAIL_FROM_NAME
        value: German Butchery Training

databases:
  - name: lms-db
    plan: free
