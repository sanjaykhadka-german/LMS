services:
  # ─── Tracey monorepo (added Phase 1) ───
  - type: web
    name: lms-web
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @tracey/db run migrate && pnpm --filter lms-web build
    startCommand: pnpm --filter lms-web start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: TZ
        value: Australia/Sydney
      - key: DATABASE_URL
        fromDatabase:
          name: lms-db
          property: connectionString
      - key: NODE_VERSION
        value: "22.13.0"
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_URL
        sync: false
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        value: onboarding@resend.dev
      - key: MAIL_FROM_NAME
        value: Tracey
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER_MONTHLY
        sync: false
      - key: STRIPE_PRICE_STARTER_ANNUAL
        sync: false
      - key: STRIPE_PRICE_PRO_MONTHLY
        sync: false
      - key: STRIPE_PRICE_PRO_ANNUAL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      # Comma-separated emails. Members of this list see the /platform
      # super-admin surface. Keep tightly scoped to actual operators.
      - key: PLATFORM_ADMIN_EMAILS
        sync: false
      # Phase 7a — auto-provision a per-tenant schema for every new signup
      # via onboarding/actions.ts. Off would silently leave new tenants on
      # the legacy public.lms_* fallback (the DIGITECH bug, 2026-05-11).
      - key: PER_TENANT_SCHEMA_ENABLED
        value: "true"

  # ─── Tracey Planning (added Phase 1 — 2026-05-13) ───
  # Service definition only. autoDeploy is OFF because Tino's Vercel
  # deployment keeps owning production at tracey.app until the Phase 6
  # data migration is complete. This block lets the service be spun up
  # on demand from the Render dashboard for staging tests, and the
  # eventual Phase 6 cutover just flips autoDeploy to true.
  #
  # Planning still talks to its own Supabase project — DATABASE_URL is
  # intentionally absent from this block. Replaced by NEXT_PUBLIC_SUPABASE_*
  # env vars (synced from Tino's Vercel config when staging is provisioned).
  - type: web
    name: planning-web
    runtime: node
    plan: free
    autoDeploy: false
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter planning-web build
    startCommand: pnpm --filter planning-web start
    envVars:
      - key: TZ
        value: Australia/Sydney
      - key: NODE_VERSION
        value: "22.13.0"
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false

  # ─── ShiftCraft (added 2026-05-19 — slot reclaimed from retired Flask lms service) ───
  # Service definition only. autoDeploy is OFF because ShiftCraft lives on
  # its own branch (shiftcraft/session-*) and main is the LMS lineage; we
  # don't want main pushes to deploy ShiftCraft. Spin up on demand from the
  # Render dashboard, pointing at the chosen shiftcraft branch.
  - type: web
    name: shiftcraft-web
    runtime: node
    plan: free
    autoDeploy: false
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter shiftcraft-web build
    startCommand: pnpm --filter shiftcraft-web start
    envVars:
      - key: TZ
        value: Australia/Sydney
      - key: NODE_VERSION
        value: "22.13.0"
      - key: DATABASE_URL
        fromDatabase:
          name: lms-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_URL
        sync: false
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        value: onboarding@resend.dev
      - key: MAIL_FROM_NAME
        value: Tracey
      - key: NEXT_PUBLIC_APP_URL
        sync: false

  - type: cron
    name: lms-stripe-reconcile
    runtime: node
    plan: free
    schedule: "0 3 * * *"
    buildCommand: corepack enable && pnpm install --frozen-lockfile
    startCommand: pnpm --filter lms-web run reconcile:stripe
    envVars:
      - key: TZ
        value: Australia/Sydney
      - key: DATABASE_URL
        fromDatabase:
          name: lms-db
          property: connectionString
      - key: NODE_VERSION
        value: "22.13.0"
      - key: STRIPE_SECRET_KEY
        sync: false

  # Phase 5 — replaces Flask's lazy WHS reminder pass that used to run on
  # each admin GET. Once Flask is dormant, no admin GET fires that code, so
  # WHS expiry reminders need a real cron. Iterates every tenant.
  - type: cron
    name: lms-whs-reminders
    runtime: node
    plan: free
    schedule: "0 20 * * *"  # 20:00 UTC = 06:00 Australia/Sydney (AEST/AEDT auto-handled by TZ)
    buildCommand: corepack enable && pnpm install --frozen-lockfile
    startCommand: pnpm --filter lms-web run cron:whs-reminders
    envVars:
      - key: TZ
        value: Australia/Sydney
      - key: DATABASE_URL
        fromDatabase:
          name: lms-db
          property: connectionString
      - key: NODE_VERSION
        value: "22.13.0"
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        value: onboarding@resend.dev
      - key: MAIL_FROM_NAME
        value: Tracey

databases:
  - name: lms-db
    plan: free
